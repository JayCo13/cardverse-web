name: Daily card data sync

# Runs in the cloud on a schedule, so your Mac no longer has to be on.
# You can also trigger it manually from the Actions tab (Run workflow).
on:
  schedule:
    # 03:17 UTC ≈ 10:17 Vietnam time (ICT, UTC+7), daily.
    # NOTE: avoid minute "0" — top-of-hour schedules are heavily delayed or
    # dropped by GitHub under load. An off-peak minute is far more reliable.
    - cron: '17 3 * * *'
  workflow_dispatch: {}

# Never run two syncs at once.
concurrency:
  group: daily-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      # Provide both prefixed + non-prefixed forms (bash scripts use the
      # non-prefixed ones; the .ts crawlers read either via dotenv).
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      EBAY_APP_ID: ${{ secrets.EBAY_APP_ID }}
      EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run daily sync
        run: bash scripts/daily-sync.sh
